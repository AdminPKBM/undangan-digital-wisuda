<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Premium Wisuda & Kenaikan Kelas PKBM Celah Cahaya</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables & Elite Luxury Master Color Palette */
        :root {
            --bg-dark: #030712;
            --bg-surface: rgba(10, 20, 42, 0.55);
            --border-glass: rgba(212, 175, 55, 0.22);
            --border-glass-hover: rgba(212, 175, 55, 0.6);
            --gold-primary: #d4af37;
            --gold-secondary: #b38f29;
            --gold-light: #fdf6e2;
            --gold-gradient: linear-gradient(135deg, #fffcf5 0%, #d4af37 40%, #b38f29 75%, #785e13 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- PREMIUM CINEMATIC BACKGROUND --- */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(15, 32, 77, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(5, 10, 25, 1) 0%, #020408 100%);
            z-index: -2;
            animation: ambientGlow 40s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(2, 4, 10, 0.9) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(rgba(212, 175, 55, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes ambientGlow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(90deg) scale(1.05); }
        }

        /* --- ROYAL SPLASH SCREEN (COVER) --- */
        #invitation-cover {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #081129 0%, #02040a 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            transition: opacity 1.2s cubic-bezier(0.65, 0, 0.35, 1), visibility 1.2s;
        }

        #invitation-cover::before {
            content: '';
            position: absolute;
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            pointer-events: none;
        }

        #invitation-cover.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .cover-content {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1.5s forwards 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 550px;
        }

        .cover-logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 35px;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            animation: logoFloat 6s infinite ease-in-out;
        }

        #invitation-cover h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.3rem;
            font-weight: 600;
            letter-spacing: 5px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        #invitation-cover p {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        /* --- SIGNATURE LUXURY BUTTON --- */
        .btn-luxury {
            position: relative;
            padding: 20px 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #040814;
            background: var(--gold-gradient);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-luxury::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-30deg);
            animation: lightSweep 4s infinite linear;
        }

        .btn-luxury:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.5);
            letter-spacing: 5px;
        }

        @keyframes lightSweep {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        /* --- MAIN LUXURY CONTAINER --- */
        .invitation-container {
            max-width: 680px;
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 80px 50px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9), 
                        inset 0 0 40px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            position: relative;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .invitation-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered Animations */
        .show .animate-step {
            opacity: 0;
            animation: fadeInUp 1.4s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        .show .step-1 { animation-delay: 0.2s; }
        .show .step-2 { animation-delay: 0.4s; }
        .show .step-3 { animation-delay: 0.6s; }
        .show .step-4 { animation-delay: 0.8s; }
        .show .step-5 { animation-delay: 1.0s; }

        /* Double Layered Geometric Borders */
        .corner-border {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 2px solid var(--gold-primary);
            pointer-events: none;
        }
        .corner-border::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .tl { top: 25px; left: 25px; border-right: none; border-bottom: none; }
        .tl::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
        
        .tr { top: 25px; right: 25px; border-left: none; border-bottom: none; }
        .tr::before { top: 6px; right: 6px; border-left: none; border-bottom: none; }
        
        .bl { bottom: 25px; left: 25px; border-right: none; border-top: none; }
        .bl::before { bottom: 6px; left: 6px; border-right: none; border-top: none; }
        
        .br { bottom: 25px; right: 25px; border-left: none; border-top: none; }
        .br::before { bottom: 6px; right: 6px; border-left: none; border-top: none; }

        .logo-img {
            max-width: 120px;
            height: auto;
            filter: drop-shadow(0 8px 25px rgba(212, 175, 55, 0.35));
            margin-bottom: 25px;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 9px;
            text-transform: uppercase;
            color: var(--gold-primary);
            margin-bottom: 18px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.6rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 12px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .tagline {
            font-style: italic;
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
            margin: 20px 0 35px 0;
            padding: 0 20px;
            line-height: 1.7;
            letter-spacing: 0.5px;
        }

        /* Luxury Minimal Divider with Node */
        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px auto;
            width: 85%;
        }
        .divider-line {
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }
        .divider-node {
            color: var(--gold-primary);
            font-size: 0.8rem;
            text-shadow: 0 0 8px var(--gold-primary);
        }

        .opening-text {
            font-size: 0.95rem;
            color: #f1f5f9;
            margin-bottom: 45px;
            line-height: 2;
            font-weight: 300;
        }

        /* --- PREMIUM BENTO GRID DETAILS --- */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin: 40px 0;
        }

        .info-cell {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            padding: 28px;
            border-radius: 8px;
            transition: var(--transition-smooth);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .info-cell::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .info-cell:hover {
            border-color: var(--border-glass-hover);
            background: rgba(212, 175, 55, 0.04);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .info-cell:hover::before {
            opacity: 1;
        }

        .cell-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .cell-icon {
            width: 20px;
            height: 20px;
            fill: var(--gold-primary);
        }

        .cell-label {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-primary);
            font-weight: 600;
        }

        .cell-value {
            font-size: 1rem;
            color: #ffffff;
            font-weight: 300;
            line-height: 1.7;
        }

        /* --- INSTITUTIONAL SIGNATURE SECTION --- */
        .signature-container {
            margin: 50px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .sig-title {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .sig-role {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gold-light);
            letter-spacing: 1px;
        }
        .sig-space {
            height: 80px;
            width: 160px;
            position: relative;
        }
        .sig-space::after {
            content: '';
            position: absolute;
            bottom: 25px; left: 10%; width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
        }
        .sig-name {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
            border-bottom: 1px solid rgba(212, 175, 55, 0.35);
            padding-bottom: 6px;
            display: inline-block;
        }

        /* --- CONTEMPORARY COUNTDOWN --- */
        .countdown-section {
            margin: 45px 0;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0.2) 100%);
            border-radius: 8px;
            padding: 30px 20px;
            border: 1px dashed rgba(212, 175, 55, 0.25);
        }

        .countdown-title {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-primary);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .time-box {
            min-width: 75px;
            position: relative;
        }

        .time-box .num {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: #ffffff;
            display: block;
            margin-bottom: 6px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .time-box .label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* --- HIGH END DONATION CARD --- */
        .donation-section {
            margin: 50px 0;
            background: rgba(4, 9, 24, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 35px 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
        }
        .donation-header {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--gold-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .donation-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 25px;
            font-weight: 300;
        }
        .donation-box {
            display: inline-flex;
            align-items: center;
            background: rgba(2, 4, 10, 0.9);
            border: 1px solid var(--border-glass);
            padding: 12px 22px;
            border-radius: 6px;
            gap: 15px;
        }
        .donation-method {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #ffffff;
            background: #1e40af;
            padding: 5px 10px;
            border-radius: 4px;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.4);
        }
        .donation-number {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1.5px;
        }
        .btn-copy {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: var(--gold-light);
            padding: 6px 14px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn-copy:hover {
            background: var(--gold-gradient);
            color: #02040a;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* --- ACTION BUTTON SELECTIONS --- */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 45px;
        }

        .btn-sec {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 40px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 4px;
            transition: var(--transition-smooth);
            width: 100%;
            max-width: 380px;
            gap: 12px;
        }

        .btn-sec svg {
            width: 18px;
            height: 18px;
        }

        .btn-sec.maps {
            background: var(--gold-gradient);
            color: #030712;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.25);
        }

        .btn-sec.maps svg {
            fill: #030712;
        }

        .btn-sec.maps:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 35px rgba(212, 175, 55, 0.45);
        }

        .btn-sec.rsvp {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-sec.rsvp svg {
            fill: #ffffff;
            transition: var(--transition-smooth);
        }

        .btn-sec.rsvp:hover {
            border-color: var(--gold-primary);
            color: var(--gold-light);
            background: rgba(212, 175, 55, 0.06);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .btn-sec.rsvp:hover svg {
            fill: var(--gold-light);
        }

        /* --- FLOATING MUSIC CONTROLS --- */
        .audio-player-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: rgba(6, 12, 30, 0.9);
            border: 1px solid var(--gold-primary);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 15px rgba(212,175,55,0.2);
            cursor: pointer;
            z-index: 1000;
            transition: var(--transition-smooth);
        }

        .audio-player-widget:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(212,175,55,0.4);
        }

        .audio-player-widget svg {
            width: 22px;
            height: 22px;
            fill: var(--gold-primary);
        }

        .spin-anim {
            animation: vinylSpin 5s linear infinite;
        }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 60px;
            letter-spacing: 2px;
            line-height: 1.9;
            font-weight: 300;
        }

        /* --- ADAPTIVE RESPONSIVENESS --- */
        @media (min-width: 576px) {
            .details-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .full-row {
                grid-column: span 2;
            }
            .action-area {
                flex-direction: row;
                justify-content: center;
            }
            .btn-sec {
                width: auto;
            }
            h1 {
                font-size: 3.2
